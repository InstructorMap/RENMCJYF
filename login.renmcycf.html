<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1128">
    <meta name="google" content="notranslate">
    <title>Acceso al Panel · RENMCYCF</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&family=Montserrat:wght@700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --navy: #0a1128; --gold: #d4af37; --blue: #1e3a8a; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: linear-gradient(135deg, #0a1128 0%, #1e3a8a 50%, #0a1128 100%);
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }
        
        .login-container {
            width: 100%;
            max-width: 420px;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(212, 175, 55, 0.3);
            position: relative;
            overflow: hidden;
            animation: fadeInUp 0.6s ease-out;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .login-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, var(--gold), var(--blue), var(--gold));
            animation: shimmer 3s infinite;
        }
        
        @keyframes shimmer {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .input-field {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s;
            background: #f8fafc;
            color: #1e293b;
            font-family: 'Inter', sans-serif;
        }
        
        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.15);
            background: #ffffff;
        }
        
        .input-field::placeholder {
            color: #94a3b8;
        }
        
        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--navy);
            color: var(--gold);
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s;
            font-family: 'Montserrat', sans-serif;
            box-shadow: 0 8px 25px rgba(10, 17, 40, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .btn-login:hover {
            background: #152040;
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(10, 17, 40, 0.5);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .error-box {
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 10px;
            padding: 12px 16px;
            color: #dc2626;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
            animation: shake 0.5s ease-in-out;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        
        .success-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            padding: 12px 16px;
            color: #16a34a;
            font-size: 13px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .lock-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, var(--navy), var(--blue));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(10, 17, 40, 0.3);
            border: 3px solid var(--gold);
        }
        
        .forgot-link {
            color: #64748b;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .forgot-link:hover {
            color: var(--navy);
        }
        
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        
        .particle {
            position: absolute;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0.3;
            animation: float 8s infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(90deg); }
            75% { transform: translateY(10px) rotate(270deg); }
        }
        
        .loader {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(212, 175, 55, 0.3);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Partículas de fondo -->
    <div class="particles" id="particles"></div>

    <!-- Contenedor de Login -->
    <div class="login-container" style="z-index: 10;">
        
        <!-- Icono de candado -->
        <div class="lock-icon">
            <i data-lucide="shield-check" style="width: 32px; height: 32px; color: #d4af37;"></i>
        </div>
        
        <!-- Logo y título -->
        <div class="text-center mb-8">
            <h1 class="text-2xl font-black text-[#0a1128] mb-1" style="font-family: 'Montserrat', sans-serif;">
                RENMCYCF
            </h1>
            <p class="text-[10px] text-[#d4af37] font-bold uppercase tracking-[0.3em]">
                Centro de Comando
            </p>
            <p class="text-xs text-slate-400 mt-3 font-medium">
                Acceso restringido a personal autorizado
            </p>
        </div>
        
        <!-- Mensaje de error -->
        <div id="error-message" class="hidden mb-4"></div>
        
        <!-- Mensaje de éxito -->
        <div id="success-message" class="hidden mb-4"></div>
        
        <!-- Formulario -->
        <form id="login-form" onsubmit="handleLogin(event)" class="space-y-5">
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">
                    <i data-lucide="mail" class="inline w-3 h-3 mr-1"></i> Correo Electrónico
                </label>
                <input 
                    type="email" 
                    id="email" 
                    class="input-field" 
                    placeholder="admin@renmcycf.ar" 
                    required 
                    autocomplete="email"
                    autofocus
                >
            </div>
            
            <div>
                <label class="block text-xs font-bold text-slate-600 uppercase tracking-wider mb-2">
                    <i data-lucide="key" class="inline w-3 h-3 mr-1"></i> Contraseña
                </label>
                <input 
                    type="password" 
                    id="password" 
                    class="input-field" 
                    placeholder="••••••••••••" 
                    required 
                    autocomplete="current-password"
                >
            </div>
            
            <button type="submit" class="btn-login" id="btn-submit">
                <i data-lucide="log-in" class="w-4 h-4"></i>
                INGRESAR AL PANEL
            </button>
        </form>
        
        <!-- Links adicionales -->
        <div class="mt-6 text-center space-y-2">
            <p class="forgot-link" onclick="showResetInfo()">
                ¿Olvidaste tu contraseña? Contacta al administrador
            </p>
            <a href="index.renmcycf.html" class="block text-[10px] text-slate-400 hover:text-slate-600 transition-colors font-medium">
                ← Volver al sitio público
            </a>
        </div>
        
        <!-- Footer -->
        <div class="mt-8 pt-6 border-t border-slate-200 text-center">
            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-wider">
                Tecnología ASARI SaaS © 2026
            </p>
        </div>
    </div>

    <script>
        // ============================================================
        // CONFIGURACIÓN DE SUPABASE
        // ============================================================
        const PROJECT_URL = 'https://hiirhuohxpzsphlduypo.supabase.co';
        const PUBLIC_KEY  = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhpaXJodW9oeHB6c3BobGR1eXBvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyOTgyMTAsImV4cCI6MjA5OTg3NDIxMH0.qvEaRyo0vbnaW9hiX4bXhtRdMkW7n9mDMrApKBRmbhE';
        const db = supabase.createClient(PROJECT_URL, PUBLIC_KEY);

        // ============================================================
        // PARTÍCULAS DE FONDO
        // ============================================================
        function createParticles() {
            const container = document.getElementById('particles');
            const colors = ['#d4af37', '#3b82f6', '#ffffff', '#d4af37'];
            
            for (let i = 0; i < 20; i++) {
                const particle = document.createElement('div');
                particle.classList.add('particle');
                
                const size = Math.random() * 4 + 2;
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const duration = Math.random() * 10 + 5;
                const delay = Math.random() * 5;
                
                particle.style.cssText = `
                    width: ${size}px;
                    height: ${size}px;
                    left: ${x}%;
                    top: ${y}%;
                    animation-duration: ${duration}s;
                    animation-delay: ${delay}s;
                    background: ${colors[Math.floor(Math.random() * colors.length)]};
                `;
                
                container.appendChild(particle);
            }
        }

        // ============================================================
        // MANEJO DEL LOGIN
        // ============================================================
        async function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('btn-submit');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');
            
            // Ocultar mensajes anteriores
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            // Validaciones básicas
            if (!email || !password) {
                showError('Por favor completa todos los campos.');
                return;
            }
            
            if (password.length < 8) {
                showError('La contraseña debe tener al menos 8 caracteres.');
                return;
            }
            
            // Deshabilitar botón
            const originalHTML = btn.innerHTML;
            btn.innerHTML = '<div class="loader"></div> VERIFICANDO CREDENCIALES...';
            btn.disabled = true;
            
            try {
                console.log('🔐 Intentando login:', email);
                
                // 1. Autenticar con Supabase
                const { data: authData, error: authError } = await db.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) {
                    console.error('❌ Error de autenticación:', authError);
                    
                    if (authError.message.includes('Invalid login credentials')) {
                        throw new Error('Correo o contraseña incorrectos.');
                    } else if (authError.message.includes('Email not confirmed')) {
                        throw new Error('El correo no ha sido confirmado. Revisa tu bandeja de entrada.');
                    } else {
                        throw new Error(authError.message);
                    }
                }
                
                if (!authData.user) {
                    throw new Error('No se pudo obtener la información del usuario.');
                }
                
                console.log('✅ Usuario autenticado:', authData.user.email);
                
                // 2. Verificar rol en la tabla de roles
                const { data: rolData, error: rolError } = await db
                    .from('renmcycf_roles')
                    .select('*')
                    .eq('user_id', authData.user.id)
                    .eq('activo', true)
                    .maybeSingle();
                
                if (rolError) {
                    console.error('❌ Error al verificar rol:', rolError);
                    throw new Error('Error al verificar permisos. Contacta al administrador.');
                }
                
                if (!rolData) {
                    console.warn('⚠️ Usuario sin rol asignado');
                    // Cerrar sesión
                    await db.auth.signOut();
                    throw new Error('No tienes permisos para acceder al panel. Contacta al administrador.');
                }
                
                console.log('✅ Rol verificado:', rolData.rol);
                
                // 3. Actualizar último acceso
                await db.from('renmcycf_roles')
                    .update({ ultimo_acceso: new Date().toISOString() })
                    .eq('id', rolData.id);
                
                // 4. Mostrar éxito y redirigir
                successDiv.classList.remove('hidden');
                successDiv.innerHTML = `
                    <div class="success-box">
                        <i data-lucide="check-circle" class="w-4 h-4"></i>
                        Acceso concedido. Redirigiendo al panel...
                    </div>
                `;
                lucide.createIcons();
                
                // Guardar sesión en localStorage
                localStorage.setItem('renmcycf_user', JSON.stringify({
                    email: authData.user.email,
                    rol: rolData.rol,
                    nombre: rolData.nombres || authData.user.email,
                    session_expires: Date.now() + (8 * 60 * 60 * 1000) // 8 horas
                }));
                
                // Redirigir al panel después de 1 segundo
                setTimeout(() => {
                    window.location.href = 'panel-renmcycf.html';
                }, 1000);
                
            } catch (err) {
                console.error('❌ Error en login:', err.message);
                showError(err.message);
            } finally {
                btn.innerHTML = originalHTML;
                btn.disabled = false;
                lucide.createIcons();
            }
        }
        
        // ============================================================
        // FUNCIONES AUXILIARES
        // ============================================================
        function showError(message) {
            const errorDiv = document.getElementById('error-message');
            errorDiv.classList.remove('hidden');
            errorDiv.innerHTML = `
                <div class="error-box">
                    <i data-lucide="alert-circle" class="w-4 h-4 shrink-0"></i>
                    <span>${message}</span>
                </div>
            `;
            lucide.createIcons();
        }
        
        function showResetInfo() {
            alert('📧 Contacta al administrador del sistema:\n\n' +
                  'Email: admin@renmcycf.ar\n\n' +
                  'Solo el Superadmin puede restablecer contraseñas.');
        }
        
        // ============================================================
        // VERIFICAR SESIÓN EXISTENTE
        // ============================================================
        async function checkExistingSession() {
            const { data: { session } } = await db.auth.getSession();
            
            if (session) {
                console.log('🔍 Sesión existente detectada');
                
                // Verificar si la sesión en localStorage aún es válida
                const storedUser = localStorage.getItem('renmcycf_user');
                if (storedUser) {
                    const userData = JSON.parse(storedUser);
                    if (userData.session_expires > Date.now()) {
                        console.log('✅ Sesión válida, redirigiendo al panel...');
                        document.getElementById('success-message').classList.remove('hidden');
                        document.getElementById('success-message').innerHTML = `
                            <div class="success-box">
                                <i data-lucide="check-circle" class="w-4 h-4"></i>
                                Sesión activa. Redirigiendo...
                            </div>
                        `;
                        lucide.createIcons();
                        setTimeout(() => {
                            window.location.href = 'panel-renmcycf.html';
                        }, 800);
                        return;
                    }
                }
                
                // Sesión expirada, limpiar
                await db.auth.signOut();
                localStorage.removeItem('renmcycf_user');
            }
        }
        
        // ============================================================
        // INICIALIZACIÓN
        // ============================================================
        window.addEventListener('DOMContentLoaded', () => {
            createParticles();
            lucide.createIcons();
            checkExistingSession();
            
            // Permitir Enter para enviar
            document.getElementById('password').addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    handleLogin(e);
                }
            });
            
            console.log('🔐 Login RENMCYCF inicializado');
        });
    </script>
</body>
</html>
